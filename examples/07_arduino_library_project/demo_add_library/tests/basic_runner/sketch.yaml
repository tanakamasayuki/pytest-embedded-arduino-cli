profiles:
  esp32:
    fqbn: esp32:esp32:esp32
    platforms:
      - platform: esp32:esp32 (3.3.8)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - dir: ../../

  uno:
    fqbn: arduino:avr:uno
    platforms:
      - platform: arduino:avr (1.8.7)
    libraries:
      - dir: ../../

default_profile: esp32
